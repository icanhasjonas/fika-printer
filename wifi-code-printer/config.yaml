name: "WiFi Code Printer"
version: "0.5.2"
slug: wifi-code-printer
description: "Generate WiFi vouchers and print receipts for FIKA Bakery"
url: "https://brain.frst.dev/projects/wifi-code-printer/"
arch:
  - aarch64
  - amd64
ports:
  "3000/tcp": 3000
ports_description:
  "3000/tcp": "HTTP API"
webui: "http://[HOST]:[PORT:3000]/"
init: false
startup: application
options:
  unifi_host: "https://192.168.1.1"
  unifi_api_key: ""
  unifi_site: "default"
  printer_host: "fika-printer"
  printer_ws_port: 10
  printer_tcp_port: 9100
  bridge_url: ""
  bridge_secret: ""
  client_id: "fika-wifi-printer"
  bridge_consume: "true"
  voucher_duration_hours: 24
  voucher_quota: 1
  ssid: "fika"
  closing_time: "19:00"
  closed_days: "sun"
  timezone: "Asia/Bangkok"
  reaper_interval_minutes: 5
  reaper_grace_minutes: 5
  log_level: "info"
schema:
  unifi_host: url
  unifi_api_key: password
  unifi_site: str
  printer_host: str
  printer_ws_port: port
  printer_tcp_port: port
  bridge_url: url?
  bridge_secret: password?
  client_id: str?
  bridge_consume: str?
  voucher_duration_hours: int(1,720)
  voucher_quota: int(0,10)
  ssid: str
  closing_time: str
  closed_days: str?
  timezone: str
  reaper_interval_minutes: int(1,60)?
  reaper_grace_minutes: int(0,60)?
  log_level: list(debug|info|warn|error)
